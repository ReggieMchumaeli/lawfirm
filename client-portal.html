<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal - Reggie Legal Partners</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <span class="text-primary">REGGIE</span> LEGAL
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="practice.html">Practice Areas</a></li>
          <li class="nav-item"><a class="nav-link" href="team.html">Our Team</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link active" href="client-portal.html">Client Portal</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h2 class="text-center section-title mb-4">Client Portal</h2>
    <p class="text-center text-muted">Secure communication between you and your advocate</p>

    <!-- Login Section -->
    <div id="loginSection">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title text-center">Client Login</h5>
              <div class="mb-3">
                <label class="form-label">Case Reference / Email</label>
                <input type="text" id="loginInput" class="form-control" placeholder="e.g. CLT-2026-045" value="CLT-2026-045">
              </div>
              <button onclick="login()" class="btn btn-primary w-100">Access Portal</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Portal Dashboard -->
    <div id="portalDashboard" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>Welcome back, Mr. Kgosi</h4>
        <button onclick="logout()" class="btn btn-outline-danger btn-sm">Logout</button>
      </div>

      <div class="row">
        <!-- Updates from Advocate -->
        <div class="col-lg-7">
          <h5><i class="fas fa-bell"></i> Updates from Your Advocate</h5>
          <div id="updatesList" class="mb-4"></div>
        </div>

        <!-- Send Message -->
        <div class="col-lg-5">
          <h5><i class="fas fa-paper-plane"></i> Send Update / Request</h5>
          <div class="card">
            <div class="card-body">
              <textarea id="clientMessage" class="form-control mb-3" rows="4" placeholder="Type your message or request here..."></textarea>
              <button onclick="sendMessage()" class="btn btn-primary w-100">Send to Advocate</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="py-4 text-center bg-dark text-light">
    <p>&copy; 2026 Reggie Legal Partners. All Rights Reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let messages = [
      { from: "Adv. Mchumaeli Reggie", time: "2 hours ago", text: "We have received the court documents. Hearing scheduled for 15th June 2026." },
      { from: "Adv. Mchumaeli Reggie", time: "Yesterday", text: "Please send me the latest bank statements for evidence." }
    ];

    function login() {
      document.getElementById('loginSection').classList.add('d-none');
      document.getElementById('portalDashboard').classList.remove('d-none');
      renderUpdates();
    }

    function logout() {
      document.getElementById('loginSection').classList.remove('d-none');
      document.getElementById('portalDashboard').classList.add('d-none');
    }

    function renderUpdates() {
      const container = document.getElementById('updatesList');
      container.innerHTML = '';
      messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = 'card mb-3';
        div.innerHTML = `
          <div class="card-body">
            <small class="text-muted">${msg.time} — ${msg.from}</small>
            <p class="mt-2">${msg.text}</p>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function sendMessage() {
      const input = document.getElementById('clientMessage');
      if (input.value.trim() === '') return;

      // Simulate reply after 1 second
      messages.unshift({
        from: "You",
        time: "Just now",
        text: input.value
      });

      renderUpdates();
      input.value = '';

      // Simulate advocate reply
      setTimeout(() => {
        messages.unshift({
          from: "Adv. Mchumaeli Reggie",
          time: "Just now",
          text: "Thank you for your update. I will review it shortly."
        });
        renderUpdates();
      }, 1500);
    }
  </script>
</body>
</html>
